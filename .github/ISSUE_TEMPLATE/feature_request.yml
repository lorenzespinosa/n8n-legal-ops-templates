name: Feature Request
description: Suggest a new workflow pattern or enhancement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe what you'd like to see added.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this solve? What's the workflow scenario?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the workflow pattern or feature you'd like
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Target Platform
      options:
        - n8n (primary)
        - Make
        - Zapier
        - All platforms
    validations:
      required: true
