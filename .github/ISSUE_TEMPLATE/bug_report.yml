name: Bug Report
description: Something isn't working correctly
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.
  - type: input
    id: n8n-version
    attributes:
      label: n8n Version
      placeholder: "e.g. 1.45.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Import workflow JSON
        2. Configure credentials
        3. Execute workflow
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant n8n execution logs here (remove any sensitive data first)
      render: text
